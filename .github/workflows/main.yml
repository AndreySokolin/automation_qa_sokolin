name: Run AutoTests with Allure Report

on:
  push:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Установка зависимостей
        run: pip install -r requirements.txt

      - name: Запуск тестов
        run: pytest -v

      # Генерируем Allure отчёт
      - name: Generate Allure Report
        if: always()  # Запускается даже если тесты упали
        run: |
          npm install -g allure-commandline --quiet
          allure generate reports -o allure-report --clean

      # Публикуем отчёт на GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages
          keep_files: false
          full_commit_message: "Обновление Allure отчёта за ${{ github.sha }}"