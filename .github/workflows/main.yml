name: Run AutoTests

on:
  push:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Установка зависимостей
        run: pip install -r requirements.txt

      - name: Установка проекта
        run: pip install -e .

      - name: Запуск тестов
        run: pytest -v
